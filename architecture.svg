<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="white"/>

  <!-- Center node -->
  <rect x="145" y="120" width="110" height="40" rx="12" fill="#0071e3"/>
  <text x="200" y="145" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="600">AppleScripts</text>

  <!-- Auto-DJ -->
  <rect x="20" y="20" width="100" height="44" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="70" y="40" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Auto-DJ</text>
  <text x="70" y="53" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Daemon + Queue</text>
  <line x1="100" y1="64" x2="170" y2="120" stroke="#d2d2d7" stroke-width="1"/>

  <!-- Playlist Cmds -->
  <rect x="150" y="15" width="100" height="44" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="200" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Playlist Ops</text>
  <text x="200" y="48" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">25+ commands</text>
  <line x1="200" y1="59" x2="200" y2="120" stroke="#d2d2d7" stroke-width="1"/>

  <!-- Apple Music -->
  <rect x="280" y="20" width="100" height="44" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="330" y="40" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Apple Music</text>
  <text x="330" y="53" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">osascript bridge</text>
  <line x1="290" y1="55" x2="235" y2="120" stroke="#d2d2d7" stroke-width="1"/>

  <!-- Library -->
  <rect x="20" y="220" width="100" height="44" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="70" y="240" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Library</text>
  <text x="70" y="253" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Tracks + Metadata</text>
  <line x1="100" y1="220" x2="175" y2="160" stroke="#d2d2d7" stroke-width="1"/>

  <!-- Shortcuts -->
  <rect x="150" y="235" width="100" height="44" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="200" y="255" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Shortcuts</text>
  <text x="200" y="268" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">macOS Integration</text>
  <line x1="200" y1="235" x2="200" y2="160" stroke="#d2d2d7" stroke-width="1"/>

  <!-- Rating -->
  <rect x="280" y="220" width="100" height="44" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="330" y="240" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Rating Engine</text>
  <text x="330" y="253" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Stars + Grading</text>
  <line x1="290" y1="225" x2="225" y2="160" stroke="#d2d2d7" stroke-width="1"/>
</svg>
